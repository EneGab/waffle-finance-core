<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="blur1" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="blur2" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Outer waffle body with soft glow -->
  <rect x="40" y="40" width="720" height="720" rx="120" fill="url(#bg1)" filter="url(#blur1)"/>
  <rect x="60" y="60" width="680" height="680" rx="100" fill="url(#inner)" filter="url(#blur2)"/>

  <!-- Waffle grid — horizontal lines -->
  <line x1="60" y1="180" x2="740" y2="180" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="60" y1="290" x2="740" y2="290" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="60" y1="400" x2="740" y2="400" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="60" y1="510" x2="740" y2="510" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="60" y1="620" x2="740" y2="620" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>

  <!-- Waffle grid — vertical lines -->
  <line x1="180" y1="60" x2="180" y2="740" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="290" y1="60" x2="290" y2="740" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="400" y1="60" x2="400" y2="740" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="510" y1="60" x2="510" y2="740" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>
  <line x1="620" y1="60" x2="620" y2="740" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.18"/>

  <!-- Waffle pockets — subtle rounded squares at intersections -->
  <rect x="70" y="70" width="96" height="96" rx="18" fill="#f59e0b" opacity="0.07"/>
  <rect x="196" y="70" width="80" height="96" rx="18" fill="#f59e0b" opacity="0.05"/>
  <rect x="306" y="70" width="80" height="96" rx="18" fill="#f59e0b" opacity="0.07"/>
  <rect x="416" y="70" width="80" height="96" rx="18" fill="#f59e0b" opacity="0.05"/>
  <rect x="526" y="70" width="80" height="96" rx="18" fill="#f59e0b" opacity="0.07"/>
  <rect x="636" y="70" width="96" height="96" rx="18" fill="#f59e0b" opacity="0.05"/>

  <rect x="70" y="196" width="96" height="80" rx="18" fill="#fb923c" opacity="0.06"/>
  <rect x="306" y="196" width="80" height="80" rx="18" fill="#fb923c" opacity="0.08"/>
  <rect x="526" y="196" width="80" height="80" rx="18" fill="#fb923c" opacity="0.06"/>
  <rect x="636" y="196" width="96" height="80" rx="18" fill="#fb923c" opacity="0.08"/>

  <rect x="70" y="306" width="96" height="80" rx="18" fill="#f59e0b" opacity="0.07"/>
  <rect x="196" y="306" width="80" height="80" rx="18" fill="#f59e0b" opacity="0.09"/>
  <rect x="416" y="306" width="80" height="80" rx="18" fill="#f59e0b" opacity="0.07"/>
  <rect x="636" y="306" width="96" height="80" rx="18" fill="#f59e0b" opacity="0.09"/>

  <rect x="70" y="416" width="96" height="80" rx="18" fill="#fb923c" opacity="0.06"/>
  <rect x="306" y="416" width="80" height="80" rx="18" fill="#fb923c" opacity="0.08"/>
  <rect x="526" y="416" width="80" height="80" rx="18" fill="#fb923c" opacity="0.06"/>
  <rect x="636" y="416" width="96" height="80" rx="18" fill="#fb923c" opacity="0.08"/>

  <rect x="70" y="526" width="96" height="80" rx="18" fill="#f59e0b" opacity="0.07"/>
  <rect x="196" y="526" width="80" height="80" rx="18" fill="#f59e0b" opacity="0.05"/>
  <rect x="416" y="526" width="80" height="80" rx="18" fill="#f59e0b" opacity="0.07"/>
  <rect x="526" y="526" width="80" height="80" rx="18" fill="#f59e0b" opacity="0.05"/>

  <rect x="70" y="636" width="96" height="96" rx="18" fill="#fb923c" opacity="0.06"/>
  <rect x="306" y="636" width="80" height="96" rx="18" fill="#fb923c" opacity="0.08"/>
  <rect x="526" y="636" width="80" height="96" rx="18" fill="#fb923c" opacity="0.06"/>
  <rect x="636" y="636" width="96" height="96" rx="18" fill="#fb923c" opacity="0.08"/>

  <!-- Center glow pulse -->
  <circle cx="400" cy="400" r="180" fill="#f59e0b" opacity="0.04" filter="url(#blur1)"/>
</svg>
