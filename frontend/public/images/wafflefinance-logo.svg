<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="ws" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#f59e0b" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Base waffle shape -->
  <rect x="20" y="20" width="160" height="160" rx="28" fill="url(#wg1)" filter="url(#ws)"/>
  <!-- Waffle grid lines horizontal -->
  <line x1="20" y1="57" x2="180" y2="57" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="93" x2="180" y2="93" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="107" x2="180" y2="107" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="20" y1="143" x2="180" y2="143" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Waffle grid lines vertical -->
  <line x1="57" y1="20" x2="57" y2="180" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="93" y1="20" x2="93" y2="180" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="107" y1="20" x2="107" y2="180" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="143" y1="20" x2="143" y2="180" stroke="#92400e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Waffle pockets (darker squares) -->
  <rect x="25" y="25" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="61" y="25" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="111" y="25" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="147" y="25" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="25" y="61" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="111" y="61" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="147" y="61" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="61" y="111" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="25" y="111" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="147" y="111" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="25" y="147" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="61" y="147" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="111" y="147" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <rect x="147" y="147" width="28" height="28" rx="6" fill="#92400e" opacity="0.25"/>
  <!-- Center swap arrows -->
  <circle cx="100" cy="100" r="26" fill="#1c0a00" opacity="0.7"/>
  <path d="M88 95 L100 83 L112 95" stroke="#fcd34d" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M112 105 L100 117 L88 105" stroke="#fcd34d" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="100" y1="83" x2="100" y2="117" stroke="#fcd34d" stroke-width="3.5" stroke-linecap="round"/>
